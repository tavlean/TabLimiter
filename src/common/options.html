<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Tab Limiter Settings</title>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1, viewport-fit=cover"
        />
        <meta
            name="color-scheme"
            content="light dark"
        />
        <link
            rel="stylesheet"
            href="options.css"
        />
        <script
            src="options.js"
            defer
        ></script>
    </head>

    <body>
        <div class="header">
            <div class="header-left">
                <img
                    src="assets/icon32.png"
                    alt="Tab Limiter"
                    class="header-icon"
                />
                <h1>Tab Limiter <span class="plus">+</span></h1>
                <div class="subtitle hidden" id="subtitle"> Settings</div>
            </div>
            <button
                type="button"
                id="settingsToggle"
                class="settings-btn"
                aria-label="Toggle settings"
                aria-expanded="false"
            >
                <img src="assets/settings.svg" alt="Settings" class="settings-icon" />
            </button>
        </div>

        <div id="mainView" class="view-container">
            <div class="cards-container">
            <div class="card" id="windowCard">
                <div class="card-header">
                    <img src="assets/window.svg" alt="Window" class="card-icon"/>
                    <h2>Window</h2>
                </div>
                
                <div class="card-content">
                    <div class="stepper-group">
                        <div class="stepper-container">
                            <button
                                type="button"
                                class="stepper-btn"
                                data-input="maxWindow"
                                data-action="decrement"
                                aria-label="Decrease maximum tabs per window"
                            >
                                –
                            </button>
                            <input
                                id="maxWindow"
                                type="number"
                                min="1"
                                max="1337"
                                class="stepper-input"
                                value="20"
                                inputmode="numeric"
                                aria-live="polite"
                            />
                            <button
                                type="button"
                                class="stepper-btn"
                                data-input="maxWindow"
                                data-action="increment"
                                aria-label="Increase maximum tabs per window"
                            >
                                +
                            </button>
                        </div>
                        <label class="stepper-label">max tabs / window</label>
                    </div>
                    
                    <div class="progress-group">
                        <div class="progress-bar">
                            <div class="progress-fill" id="windowProgressFill"></div>
                        </div>
                        <div class="progress-labels">
                            <span class="progress-item">
                                <span class="progress-number" id="windowOpenCount">0</span>
                                <span class="progress-text">open</span>
                            </span>
                            <span class="progress-item">
                                <span class="progress-number" id="windowLeftCount">0</span>
                                <span class="progress-text">left</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" id="allWindowsCard">
                <div class="card-header">
                    <img src="assets/windows.svg" alt="All Windows" class="card-icon"/>
                    <h2>All Windows</h2>
                    <span class="count-badge" id="windowCountBadge">1</span>
                </div>
                
                <div class="card-content">
                    <div class="stepper-group">
                        <div class="stepper-container">
                            <button
                                type="button"
                                class="stepper-btn"
                                data-input="maxTotal"
                                data-action="decrement"
                                aria-label="Decrease maximum total tabs"
                            >
                                –
                            </button>
                            <input
                                id="maxTotal"
                                type="number"
                                min="1"
                                max="1337"
                                class="stepper-input"
                                value="50"
                                inputmode="numeric"
                                aria-live="polite"
                            />
                            <button
                                type="button"
                                class="stepper-btn"
                                data-input="maxTotal"
                                data-action="increment"
                                aria-label="Increase maximum total tabs"
                            >
                                +
                            </button>
                        </div>
                        <label class="stepper-label">max tabs total</label>
                    </div>
                    
                    <div class="progress-group">
                        <div class="progress-bar">
                            <div class="progress-fill" id="globalProgressFill"></div>
                        </div>
                        <div class="progress-labels">
                            <span class="progress-item">
                                <span class="progress-number" id="globalOpenCount">0</span>
                                <span class="progress-text">open</span>
                            </span>
                            <span class="progress-item">
                                <span class="progress-number" id="globalLeftCount">0</span>
                                <span class="progress-text">left</span>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" id="domainCard">
                <div class="card-header">
               <img src="assets/domain.svg" alt="Window" class="card-icon"/>
                    <h2>Domain</h2>
                </div>

                <div class="card-content">
                    <div class="stepper-group" id="domainStepperGroup">
                        <div class="stepper-container" id="domainStepperContainer">
                            <button
                                type="button"
                                class="stepper-btn"
                                data-input="maxDomain"
                                data-action="decrement"
                                aria-label="Decrease maximum tabs per domain"
                            >
                                –
                            </button>
                            <input
                                id="maxDomain"
                                type="number"
                                min="1"
                                max="200"
                                class="stepper-input"
                                value="10"
                                inputmode="numeric"
                                aria-live="polite"
                            />
                            <button
                                type="button"
                                class="stepper-btn"
                                data-input="maxDomain"
                                data-action="increment"
                                aria-label="Increase maximum tabs per domain"
                            >
                                +
                            </button>
                        </div>
                        <label class="stepper-label">max tabs / domain</label>
                    </div>

                    <div class="domain-list-group">
                        <ul class="domain-list" id="domainList" aria-live="polite"></ul>
                        <p class="domain-empty hidden" id="domainEmptyState">No web domains open</p>
                        <div class="domain-permission-overlay" id="domainPermissionOverlay">
                            <div class="domain-permission-content">
                                <button type="button" class="domain-enable-btn" id="domainEnableBtn">Enable</button>
                                <p class="domain-permission-note">Needs tab URL access. Nothing is stored or sent.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </div>

        <div id="settingsView" class="view-container hidden">
            <div class="section">
                        <label class="toggle-row">
                <input
                    id="enableDomainLimit"
                    type="checkbox"
                    class="toggle-input checkbox-input"
                />
                <span
                    class="toggle-slider"
                    aria-hidden="true"
                ></span>
                <div class="toggle-text">
                    <div class="label-title">Limit per Domain</div>
                    <div class="label-desc">Limit max tabs per domain</div>
                </div>
            </label>
                <label class="toggle-row">
                <input
                    id="displayBadge"
                    type="checkbox"
                    class="toggle-input checkbox-input"
                />
                <span
                    class="toggle-slider"
                    aria-hidden="true"
                ></span>
                <div class="toggle-text">
                    <div class="label-title">Badge</div>
                    <div class="label-desc">Show remaining tabs on icon</div>
                </div>
            </label>

            <label class="toggle-row">
                <input
                    id="displayAlert"
                    type="checkbox"
                    class="toggle-input checkbox-input"
                />
                <span
                    class="toggle-slider"
                    aria-hidden="true"
                ></span>
                <div class="toggle-text">
                    <div class="label-title">Alert</div>
                    <div class="label-desc">Show alert when limit is reached</div>
                </div>
            </label>

            <label class="toggle-row">
                <input
                    id="exceedTabNewWindow"
                    type="checkbox"
                    class="toggle-input checkbox-input"
                />
                <span
                    class="toggle-slider"
                    aria-hidden="true"
                ></span>
                <div class="toggle-text">
                    <div class="label-title">Balance Tabs</div>
                    <div class="label-desc">Open extra tabs in other window</div>
                </div>
            </label>

            <label class="toggle-row">
                <input
                    id="countPinnedTabs"
                    type="checkbox"
                    class="toggle-input checkbox-input"
                />
                <span
                    class="toggle-slider"
                    aria-hidden="true"
                ></span>
                <div class="toggle-text">
                    <div class="label-title">Count Pinned</div>
                    <div class="label-desc">Pinned tabs count towards the limit</div>
                </div>
            </label>

            <label class="toggle-row">
                <input
                    id="coloredFavicons"
                    type="checkbox"
                    class="toggle-input checkbox-input"
                />
                <span
                    class="toggle-slider"
                    aria-hidden="true"
                ></span>
                <div class="toggle-text">
                    <div class="label-title">Colored favicons</div>
                    <div class="label-desc">Show colored favicons in the domain list</div>
                </div>
            </label>


        </div>

        <footer class="footer">
            <span id="footerVersion"></span>
            <span>·</span>
            <a href="https://github.com/tavlean/TabLimiterPlus/issues" target="_blank" rel="noopener">Feedback</a>
            <span>·</span>
            <span>Made by <a href="https://x.com/tavlean" target="_blank" rel="noopener">Tavlean</a></span>
        </footer>
    </body>
</html>
